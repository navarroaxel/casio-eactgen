name: Build
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - uses: actions/checkout@v6
        with:
          repository: navarroaxel/casio-eactgen-py
          path: ../casio-eactgen-py
      - run: npm test
      - run: npm run build
